<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolution — Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero" id="hero">
      <div class="bg-layer bg-gradient" aria-hidden="true"></div>
      <div class="bg-layer bg-shape bg-shape--a" data-parallax="0.2" aria-hidden="true"></div>
      <div class="bg-layer bg-shape bg-shape--b" data-parallax="0.14" aria-hidden="true"></div>
      <div class="bg-layer bg-shape bg-shape--c" data-parallax="0.1" aria-hidden="true"></div>
      <div class="bg-layer bg-wave" data-parallax="0.08" aria-hidden="true"></div>

      <header class="hero-text hero-title">EVOLUTION</header>
      <div class="hero-text hero-year">2026</div>

      <section class="centerpiece" aria-label="Sphere visual">
        <div class="sphere-scene" id="sphereScene">
          <div class="sphere-float">
            <div class="sphere-core">
              <!-- Replaceable placeholder sphere asset -->
              <img src="sphere.svg" alt="Glossy glass sphere" class="sphere-image" />
            </div>
          </div>
        </div>
      </section>

      <footer class="meta-row">
        <span class="meta meta-left">DESIGN PORTFOLIO</span>
        <span class="meta meta-center">IM YESEO</span>
        <span class="meta meta-right">SINCE 2021</span>
      </footer>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
